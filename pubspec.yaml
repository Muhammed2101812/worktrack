name: worklog
description: A daily work log app for freelancers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^13.2.0
  
  # Local DB
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Connectivity
  connectivity_plus: ^6.0.3
  
  # Charts
  fl_chart: ^1.1.1
  
  # Theme
  flex_color_scheme: ^8.0.0
  
  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  
  # UI
  cupertino_icons: ^1.0.6
  sqflite_common_ffi_web: ^1.1.1
  csv: ^7.2.0
  file_saver: ^0.3.1
  google_fonts: ^6.2.1
  flutter_inset_shadow: ^2.0.1
  phosphor_flutter: ^2.1.0
  excel: ^4.0.6
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/