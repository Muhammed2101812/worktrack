name: worklog
description: A daily work log app for freelancers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^13.2.0
  
  # Local DB
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Connectivity
  connectivity_plus: ^6.0.3
  
  # Charts
  fl_chart: ^1.1.1
  
  # Theme
  flex_color_scheme: ^8.0.0
  
  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  flutter_dotenv: ^5.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  sqflite_common_ffi_web: ^1.1.1
  google_fonts: ^6.2.1
  flutter_inset_shadow: ^2.0.1
  phosphor_flutter: ^2.1.0
  excel: ^4.0.6
  file_picker: ^8.1.7
  google_sign_in: ^6.2.1
  archive: ^3.6.1
  share_plus: ^10.1.2
  path_provider: ^2.1.4

  # Ads & Monetization
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

  # PDF export
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1E293B"
  adaptive_icon_foreground: "assets/images/app_icon.png"